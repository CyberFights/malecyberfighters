<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOVA OS Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #05060d;
    --panel: rgba(12,18,32,0.72);
    --accent: #4fd1ff;
    --accent-glow: 0 0 22px rgba(79,209,255,0.7);
    --text: #e8f7ff;
    --muted: #7b8ca5;
    --radius: 14px;
    --border: 1px solid rgba(79,209,255,0.35);
    --glass: rgba(10,16,32,0.55);
  }

  body {
    margin: 0;
    background: radial-gradient(circle at top, #0f1a33, #05060d 40%, #02030a 100%);
    font-family: system-ui, sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* HEADER */
  header {
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--glass);
    border-bottom: var(--border);
    backdrop-filter: blur(18px);
  }

  header img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    box-shadow: var(--accent-glow);
  }

  header h1 {
    font-size: 1.1rem;
    margin: 0;
    color: var(--accent);
  }

  /* MAIN PUBLIC CHAT */
  #publicChat {
    height: calc(100vh - 180px);
    overflow-y: auto;
    padding: 12px;
  }

  .msg {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 0, #4fd1ff, #1b9fff 40%, #050814 100%);
    box-shadow: var(--accent-glow);
  }

  .msg-body {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 8px 12px;
    border: var(--border);
    flex: 1;
  }

  .msg-author {
    color: var(--accent);
    font-size: 0.85rem;
  }

  .msg-text {
    margin-top: 4px;
    font-size: 0.9rem;
  }

  /* INPUT BAR */
  #inputBar {
    padding: 10px;
    background: var(--glass);
    border-top: var(--border);
    display: flex;
    gap: 10px;
  }

  #publicInput {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    border: var(--border);
    background: rgba(5,8,20,0.9);
    color: var(--text);
  }

  #publicSend {
    padding: 10px 16px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, #4fd1ff, #1b9fff);
    border: none;
    color: #050814;
    font-weight: 600;
    box-shadow: var(--accent-glow);
  }

  /* FLOATING DM BUTTON */
  #dmButton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #050814;
    padding: 14px 18px;
    border-radius: 999px;
    box-shadow: var(--accent-glow);
    font-weight: 700;
  }

  /* DM SIDEBAR */
  #dmSidebar {
    position: fixed;
    top: 0;
    right: -100%;
    width: 80%;
    height: 100%;
    background: var(--glass);
    border-left: var(--border);
    backdrop-filter: blur(18px);
    transition: 0.3s;
    padding: 14px;
    overflow-y: auto;
  }

  #dmSidebar.open {
    right: 0;
  }

  .dm-user {
    padding: 10px;
    border-radius: var(--radius);
    background: var(--panel);
    border: var(--border);
    margin-bottom: 10px;
  }

  /* ROOM POPUP */
  #roomPopup {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 70%;
    background: var(--glass);
    border-top: var(--border);
    backdrop-filter: blur(18px);
    transition: 0.3s;
    padding: 14px;
    overflow-y: auto;
  }

  #roomPopup.open {
    bottom: 0;
  }

  /* PROFILE POPUP */
  #profilePopup {
    position: fixed;
    top: 0;
    left: -100%;
    width: 80%;
    height: 100%;
    background: var(--glass);
    border-right: var(--border);
    backdrop-filter: blur(18px);
    transition: 0.3s;
    padding: 14px;
    overflow-y: auto;
  }

  #profilePopup.open {
    left: 0;
  }

</style>
</head>

<body>

<header>
  <img src="./images/mcf.png">
  <div>
    <h1>NOVA OS Mobile</h1>
    <div class="muted">Realtime Arena</div>
  </div>
</header>

<div id="publicChat"></div>

<div id="inputBar">
  <input id="publicInput" placeholder="Message the Arena…">
  <button id="publicSend">Send</button>
</div>

<button id="dmButton">DMs</button>

<!-- DM SIDEBAR -->
<div id="dmSidebar"></div>

<!-- ROOM POPUP -->
<div id="roomPopup"></div>

<!-- PROFILE POPUP -->
<div id="profilePopup"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  const chat = document.getElementById("publicChat");
  const input = document.getElementById("publicInput");
  const send = document.getElementById("publicSend");

  const dmSidebar = document.getElementById("dmSidebar");
  const dmButton = document.getElementById("dmButton");

  const roomPopup = document.getElementById("roomPopup");
  const profilePopup = document.getElementById("profilePopup");

  let msgCount = 0;

  function addMsg({ from, text, avatar }) {
    const wrap = document.createElement("div");
    wrap.className = "msg";

    const av = document.createElement("div");
    av.className = "msg-avatar";
    if (avatar) av.style.backgroundImage = `url(${avatar})`;

    const body = document.createElement("div");
    body.className = "msg-body";

    const author = document.createElement("div");
    author.className = "msg-author";
    author.textContent = from;

    const txt = document.createElement("div");
    txt.className = "msg-text";
    txt.textContent = text;

    body.appendChild(author);
    body.appendChild(txt);
    wrap.appendChild(av);
    wrap.appendChild(body);

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  /* PUBLIC CHAT */
  socket.on("publicMessage", msg => addMsg(msg));
  socket.on("externalPublicMessage", msg => addMsg(msg));

  send.onclick = () => {
    const text = input.value.trim();
    if (!text) return;

    socket.emit("publicMessage", {
      from: "You",
      display: "You",
      text
    });

    addMsg({ from: "You", text });
    input.value = "";
  };

  /* DM SIDEBAR */
  dmButton.onclick = () => {
    dmSidebar.classList.toggle("open");
  };

  socket.on("dmPartners", list => {
    dmSidebar.innerHTML = "<h2>Direct Messages</h2>";
    list.forEach(u => {
      const div = document.createElement("div");
      div.className = "dm-user";
      div.textContent = u;
      div.onclick = () => openDM(u);
      dmSidebar.appendChild(div);
    });
  });

  function openDM(username) {
    alert("Open DM window for " + username);
  }

  /* ROOMS */
  socket.on("roomsList", rooms => {
    roomPopup.innerHTML = "<h2>Rooms</h2>";
    rooms.forEach(r => {
      const div = document.createElement("div");
      div.className = "dm-user";
      div.textContent = (r.private ? "🔒 " : "") + r.name;
      div.onclick = () => openRoom(r._id, r.name);
      roomPopup.appendChild(div);
    });
  });

  function openRoom(id, name) {
    roomPopup.classList.add("open");
    roomPopup.innerHTML = `<h2>${name}</h2>`;
  }

</script>

</body>
</html>
