<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Male Cyber Fighters – Mobile</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #0a0a0f;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* LOGIN SCREEN */
#loginScreen {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
}

#loginScreen h1 {
  font-size: 32px;
  margin-bottom: 20px;
  color: #7ab8ff;
}

.login-box {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
}

.login-box input {
  width: 90%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
}

.login-box button {
  width: 90%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #3b9fff;
  color: #fff;
  font-size: 16px;
}

#loginError {
  display:none;
  color:#ff3b3b;
  margin-top:10px;
}

/* MAIN APP LAYOUT */
#app {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SIDEBAR */
#sidebar {
  width: 240px;
  height: 100vh;
  background: #0f0f15;
  position: fixed;
  left: 0;
  top: 0;
  padding-top: 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar-item {
  padding: 18px;
  font-size: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.sidebar-item.active {
  background: #3b9fff;
  color: #000;
  font-weight: bold;
}

.sidebar-item.logout {
  color: #ff3b3b;
}

/* FULL-SCREEN VIEWS */
.view {
  position: absolute;
  left: 240px;
  top: 0;
  right: 0;
  bottom: 0;
  padding: 16px;
  display: none;
}

.view.active {
  display: block;
}

/* CHAT VIEW */
#chatContainer {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

#chatHeader {
  padding: 12px;
  background: #11131a;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 18px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#onlineToggle {
  background: #3b9fff;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  color: #000;
}

/* ONLINE USERS DRAWER */
#onlineDrawer {
  max-height: 0;
  overflow: hidden;
  background: #0f0f15;
  transition: max-height 0.3s ease;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#onlineDrawer.open {
  max-height: 200px;
}

#onlineList {
  padding: 10px;
}

.onlineUser {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.onlineUser img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 10px;
}

/* CHAT MESSAGES */
#chatMessages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.chatMessage {
  margin-bottom: 12px;
  padding: 10px;
  background: #1a1d25;
  border-radius: 8px;
  max-width: 85%;
  display: flex;
  gap: 10px;
}

.chatMessage.me {
  background: #3b9fff;
  color: #000;
  margin-left: auto;
}

.chatMessage img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
}

.chatMessage .msgBody {
  display: flex;
  flex-direction: column;
}

.chatMessage .author {
  font-weight: bold;
  margin-bottom: 4px;
}

.chatImage {
  margin-top: 8px;
  max-width: 200px;
  border-radius: 8px;
}

/* INPUT BAR */
#chatInputBar {
  display: flex;
  padding: 10px;
  background: #11131a;
  border-top: 1px solid rgba(255,255,255,0.1);
}

#chatInputBar input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
}

#chatInputBar button {
  margin-left: 10px;
  padding: 12px 16px;
  border-radius: 8px;
  background: #3b9fff;
  color: #fff;
  border: none;
}

#chatUpload {
  background: #1a1a25;
  border: none;
  padding: 12px;
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
}

/* DM DRAWER */
#dmDrawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -70%;
  height: 70%;
  background: #0f0f15;
  border-top: 1px solid rgba(255,255,255,0.2);
  transition: bottom 0.3s ease;
  z-index: 9998;
  display: flex;
  flex-direction: column;
}

#dmDrawer.open {
  bottom: 0;
}

#dmHeader {
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #11131a;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#dmList {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  max-height: 120px;
  overflow-y: auto;
}

.dmUser {
  padding: 6px;
  cursor: pointer;
}

#dmMessages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

#dmInputBar {
  display: flex;
  padding: 10px;
  background: #11131a;
}

#dmInputBar input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
}

#dmInputBar button {
  margin-left: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  background: #3b9fff;
  color: #000;
  border: none;
}

/* SUPPORT POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(10,10,20,0.95);
  backdrop-filter: blur(6px);
  z-index: 9999;
  overflow-y: auto;
  padding: 20px;
  display: none;
}

.popup.active {
  display: block;
}

.popup .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}

.support-mobile {
  max-width: 480px;
  margin: 0 auto;
  padding-top: 40px;
}

#supportPopup input,
#supportPopup select,
#supportPopup textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
  margin-top: 6px;
}

/* HIDDEN ADMIN ELEMENTS */
.hidden-admin {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1>ENTER THE ARENA</h1>

  <div class="login-box">
    <input id="loginUser" placeholder="Your fighter handle">
    <input id="loginPass" type="password" placeholder="Password">
    <button id="loginSubmit">→ Login</button>
    <div id="loginError"></div>
  </div>

  <button id="btnRegister" style="margin-top:15px; background:none; border:none; color:#7ab8ff;">
    Create an account
  </button>
</div>

<!-- REGISTER MODAL -->
<div id="modalRegister" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,0.6);align-items:center;justify-content:center">
  <div>
    <h3>Register - click upload image before create account</h3>
    <div>
      <div>
        <input id="regUser" type="text" placeholder="Username" required />
        <input id="regEmail" type="email" placeholder="Email" required />
      </div>
      <div>
        <input id="regDisplay" type="text" placeholder="Display name"  required />
        <input id="regAge" type="number" min="13" placeholder="Age" required/>
      </div>
      <div>
        <input id="regPass" type="password" placeholder="Password" required />
        <input id="regColor" type="color" required/>
      </div>
      <div>
        <select id="regLanguage">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
        <input id="regWins" type="number" placeholder="Wins" />
        <input id="regLosses" type="number" placeholder="Losses" />
      </div>
      <textarea id="regInfo" placeholder="Short bio / info" rows="3"></textarea>
      <div>
        <input id="regImageFile" type="file" accept="image/*" />
        <button id="btnUploadImage" class="small-btn">Upload Image</button>
        <div id="uploadStatus">No image uploaded</div>
      </div>
      <div>
        <button id="regCancel" class="ghost">Cancel</button>
        <button id="regSubmit">Create Account</button>
      </div>
      <div id="regError" style="display:none"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-item active" data-section="chat">Arena Chat</div>
    <div class="sidebar-item" data-section="roster">Roster</div>
    <div class="sidebar-item" data-section="messages">Messages</div>
    <div class="sidebar-item" data-section="rooms">Rooms</div>
    <div class="sidebar-item" data-section="profile">My Profile</div>
    <div class="sidebar-item" id="btnDMs" data-section="dms">DMs</div>
    <div class="sidebar-item" id="btnAdmin" data-section="admin">Admin</div>
    <div class="sidebar-item logout" data-section="logout">Logout</div>
  </div>

  <!-- FULL-SCREEN VIEWS -->
  <div id="viewChat" class="view active">
    <div id="chatContainer">
      <div id="chatHeader">
        <span>Arena Chat</span>
        <button id="onlineToggle">Online</button>
      </div>
      <div id="onlineDrawer">
        <div id="onlineList"></div>
      </div>
      <div id="chatMessages"></div>
      <div id="chatInputBar">
        <input id="chatInput" placeholder="Type a message…">
        <button id="chatUpload">📷</button>
        <button id="chatSend">Send</button>
      </div>
    </div>
  </div>

  <div id="viewRoster" class="view">
    <h2>Roster</h2>
    <div id="rosterContent"></div>
  </div>

  <div id="viewMessages" class="view">
    <h2>Messages</h2>
    <div id="messagesContent"></div>
  </div>

  <div id="viewRooms" class="view">
    <h2>Rooms</h2>
    <div id="roomsContent"></div>
  </div>

  <div id="viewProfile" class="view">
    <h2>My Profile</h2>
    <div id="profileContent"></div>
  </div>

  <div id="viewAdmin" class="view">
    <h2>Admin</h2>
    <div id="adminUsersView"></div>
    <div id="adminAnalyticsView"></div>
    <div id="adminStatsSummary"></div>
    <table id="adminTopIps"><tbody></tbody></table>
    <table id="adminTable"><tbody></tbody></table>
  </div>
</div>

<!-- DM DRAWER -->
<div id="dmDrawer">
  <div id="dmHeader">
    <span>Direct Messages</span>
    <button id="dmClose">Close</button>
  </div>
  <div id="dmList"></div>
  <div id="dmMessages"></div>
  <div id="dmInputBar">
    <input id="dmInput" placeholder="Type a DM…">
    <button id="dmSend">Send</button>
  </div>
</div>

<!-- SUPPORT POPUP -->
<div id="supportPopup" class="popup">
  <button class="close-btn" onclick="closePopup('supportPopup')">Close</button>
  <div class="support-mobile">
    <h2>Support Request</h2>
    <div class="pm-section">
      <label>Type of Report</label>
      <select id="srType">
        <option value="user">User Report</option>
        <option value="issue">App Issue</option>
      </select>
    </div>
    <div class="pm-section" id="srUserSection">
      <label>Who are you reporting?</label>
      <input id="srUser" placeholder="Username">
    </div>
    <div class="pm-section">
      <label>Where did this happen?</label>
      <input id="srWhere" placeholder="Public chat, DM, room, etc.">
    </div>
    <div class="pm-section">
      <label>When did this happen?</label>
      <input id="srWhen" type="datetime-local">
    </div>
    <div class="pm-section">
      <label>Additional Information</label>
      <textarea id="srInfo" rows="5"></textarea>
    </div>
    <button id="srSubmit">Submit Report</button>
  </div>
</div>

<!-- HIDDEN ADMIN STRUCTURE (PREVENT JS ERRORS) -->
<div id="modalAdminPassword" class="hidden-admin">
  <button id="adminPasswordCancel"></button>
  <button id="adminPasswordSubmit"></button>
  <input id="adminPasswordInput">
  <div id="adminPasswordError"></div>
</div>

<div id="modalAdmin" class="hidden-admin">
  <button id="adminClose"></button>
</div>

<button id="editCancel" class="hidden-admin"></button>

<input id="chatImageFile" type="file" accept="image/*" style="display:none">

<script src="/socket.io/socket.io.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/mobile.js"></script>
<script src="/js/register.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/pm.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/dm-toggle.js"></script>
<script src="/js/profile.js"></script>

</body>
</html>
