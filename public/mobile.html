<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Male Cyber Fighters – Mobile</title>
<style>
  :root{--bg:#0a0a0f;--panel:#0f0f15;--muted:#9aa4b2;--accent:#3b9fff;--bubble:#1a1d25;--bubble-me:#3b9fff;--danger:#ff3b3b}
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui,Arial}
  /* side panel */
  #sidePanel{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--panel);z-index:1200;padding-top:18px;transition:left .22s ease;overflow:auto}
  #sidePanel.open{left:0}
  .side-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.02);cursor:pointer}
  .side-item.active{background:var(--accent);color:#000;font-weight:700}
  .side-item.logout{color:var(--danger)}
  /* main */
  #main{margin-left:0;transition:margin-left .22s ease;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #main.shift{margin-left:280px}
  #topBar{display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--panel);border-bottom:1px solid rgba(255,255,255,0.03)}
  #hamburger{background:transparent;border:none;color:var(--accent);font-weight:800;padding:8px}
  /* views */
  .view{display:none;flex-direction:column;min-height:0;height:100%}
  .view.active{display:flex}
  /* chat */
  #chatContainer{display:flex;flex-direction:column;flex:1;min-height:0}
  #onlineDrawer{max-height:0;overflow:hidden;transition:max-height .22s ease;background:var(--panel)}
  #onlineDrawer.open{max-height:220px}
  #chatMessages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
  .chatMessage{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:12px;background:var(--bubble)}
  .chatMessage.me{margin-left:auto;background:var(--bubble-me);color:#000}
  .hidden{display:none!important}
  @media (max-width:520px){#sidePanel{width:240px}#main.shift{margin-left:240px}}
</style>
</head>
<body>

<!-- Side panel (mobile) with exact desktop ids -->
<nav id="sidePanel" aria-hidden="true">
  <div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03)">
    <strong style="color:var(--accent)">Male Cyber Fighters</strong>
    <button id="sideClose" style="float:right;background:transparent;border:none;color:var(--muted)">✕</button>
  </div>

  <!-- EXACT IDS from desktop index.html / chat.js -->
  <div class="side-item active" id="btnArenaChat" data-section="chat">Arena Chat</div>
  <div class="side-item" id="btnRoster" data-section="roster">Roster</div>
  <div class="side-item" id="btnMessages" data-section="messages">Messages</div>
  <div class="side-item" id="btnRooms" data-section="rooms">Rooms</div>
  <div class="side-item" id="btnProfile" data-section="profile">My Profile</div>
  <div class="side-item" id="btnDMs" data-section="dms">DMs</div>
  <div class="side-item" id="btnAdmin" data-section="admin">Admin</div>
  <div class="side-item logout" id="btnLogout" data-section="logout">Logout</div>

  <!-- register trigger -->
  <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.03)">
    <button id="btnOpenRegister" style="width:100%;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#000">Register</button>
  </div>
</nav>

<!-- Main -->
<div id="main">
  <header id="topBar">
    <button id="hamburger">☰</button>
    <div id="pageTitle">Arena Chat</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="onlineToggle">Online</button>
      <!-- keep desktop ids (hidden if unused) -->
      <button id="btnUploadImage" class="hidden">Upload</button>
      <button id="btnEditUploadImage" class="hidden">EditUpload</button>
    </div>
  </header>

  <!-- Views -->
  <section id="viewChat" class="view active" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div id="chatContainer">
      <div id="onlineDrawer" aria-hidden="true"><div id="onlineList"></div></div>

      <!-- Desktop chat containers / ids preserved -->
      <div id="chatBox" class="hidden"></div>
      <div id="chatHistoryContainer" class="hidden"></div>

      <div id="chatMessages" aria-live="polite"></div>

      <div id="chatInputBar">
        <div id="chatInputBox" class="hidden"></div>
        <input id="chatInput" placeholder="Type a message…" autocomplete="off" />
        <button id="chatUpload">📷</button>
        <button id="chatSend" id="chatSendBtn">Send</button>
      </div>
    </div>
  </section>

  <section id="viewRoster" class="view"><h2>Roster</h2><div id="rosterContent"></div></section>
  <section id="viewMessages" class="view"><h2>Messages</h2><div id="messagesContent"></div></section>
  <section id="viewRooms" class="view"><h2>Rooms</h2><div id="roomsContent"></div></section>
  <section id="viewProfile" class="view"><h2>My Profile</h2><div id="profileContent"></div></section>
  <section id="viewAdmin" class="view"><h2>Admin</h2><div id="adminUsersView"></div><div id="adminAnalyticsView"></div></section>
</div>

<!-- DM Drawer -->
<div id="dmDrawer" aria-hidden="true">
  <div id="dmHeader"><span>Direct Messages</span><button id="dmClose">Close</button></div>
  <div id="dmList"></div>
  <div id="dmMessages"></div>
  <div id="dmInputBar"><input id="dmInput" placeholder="Type a DM…" /><button id="dmSend">Send</button></div>
</div>

<!-- Login/Register/Admin placeholders and ids used by chat.js and other scripts -->
<div id="loginScreen" class="hidden">
  <input id="loginUser" placeholder="Username" />
  <input id="loginPass" type="password" />
  <button id="loginSubmit">Login</button>
  <div id="loginError" class="hidden"></div>
  <button id="btnRegister" class="hidden">Register</button>
</div>

<div id="modalRegister" class="hidden">
  <input id="regUser" placeholder="Username" />
  <input id="regEmail" placeholder="Email" />
  <button id="regCancel">Cancel</button>
  <button id="regSubmit">Create</button>
</div>

<button id="vpClose" class="hidden"></button>
<div id="modalAdminPassword" class="hidden">
  <button id="adminPasswordCancel"></button>
  <button id="adminPasswordSubmit"></button>
  <input id="adminPasswordInput" />
  <div id="adminPasswordError"></div>
</div>
<div id="modalAdmin" class="hidden"><button id="adminClose"></button></div>
<button id="editCancel" class="hidden"></button>
<button id="btnUploadImage" class="hidden"></button>
<input id="chatImageFile" type="file" accept="image/*" class="hidden" />

<!-- legacy placeholders -->
<div id="placeholders" class="hidden"><div id="someLegacyPlaceholder"></div></div>

<!-- Scripts (utils first) -->
<script src="/socket.io/socket.io.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/register.js"></script>
<script src="/js/mobile.js"></script>
<script src="/js/pm.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/dm-toggle.js"></script>
<script src="/js/profile.js"></script>

</body>
</html>
