<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Male Cyber Fighters – Mobile</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  background: #0a0a0f;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* LOGIN SCREEN */
#loginScreen {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
}

#loginScreen h1 {
  font-size: 32px;
  margin-bottom: 20px;
  color: #7ab8ff;
}

.login-box {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
}

.login-box input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
}

.login-box button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #3b9fff;
  color: #fff;
  font-size: 16px;
}

/* MAIN APP */
#app {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SIDEBAR */
#sidebar {
  width: 240px;
  height: 100vh;
  background: #0f0f15;
  position: fixed;
  left: 0;
  top: 0;
  padding-top: 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar-item {
  padding: 18px;
  font-size: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar-item.active {
  background: #3b9fff;
  color: #000;
  font-weight: bold;
}

.sidebar-item.logout {
  color: #ff3b3b;
}

/* MAIN CONTENT */
#mainContent {
  margin-left: 240px;
  height: 100vh;
  overflow-y: auto;
  padding: 20px;
}

/* POPUPS */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(10,10,20,0.95);
  backdrop-filter: blur(6px);
  z-index: 9999;
  overflow-y: auto;
  padding: 20px;
  display: none;
}

.popup.active {
  display: block;
}

.popup .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}

/* SUPPORT POPUP */
.support-mobile {
  max-width: 480px;
  margin: 0 auto;
  padding-top: 40px;
}

#supportPopup input,
#supportPopup select,
#supportPopup textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a25;
  color: #fff;
  margin-top: 6px;
}

#srSubmit {
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #3b9fff;
  color: #fff;
}

/* HIDDEN ADMIN ELEMENTS */
.hidden-admin {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1>ENTER THE ARENA</h1>

  <div class="login-box">
    <input id="loginUser" placeholder="Your fighter handle">
    <input id="loginPass" type="password" placeholder="Password">
    <button id="loginSubmit">→ Login</button>
  </div>

  <button id="btnRegister" style="margin-top:15px; background:none; border:none; color:#7ab8ff;">
    Create an account
  </button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-item active" data-section="chat">Arena Chat</div>
    <div class="sidebar-item" data-section="roster">Roster</div>
    <div class="sidebar-item" data-section="messages">Messages</div>
    <div class="sidebar-item" data-section="rooms">Rooms</div>
    <div class="sidebar-item" data-section="profile">My Profile</div>
    <div class="sidebar-item" id="btnDMs" data-section="dms">DMs</div>
    <div class="sidebar-item" id="btnAdmin" data-section="admin">Admin</div>
    <div class="sidebar-item logout" data-section="logout">Logout</div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <h2>Welcome to the Arena</h2>
    <p>Choose a section from the sidebar.</p>
  </div>
</div>

<!-- SUPPORT POPUP -->
<div id="supportPopup" class="popup">
  <button class="close-btn" onclick="closePopup('supportPopup')">Close</button>

  <div class="support-mobile">
    <h2>Support Request</h2>

    <div class="pm-section">
      <label>Type of Report</label>
      <select id="srType">
        <option value="user">User Report</option>
        <option value="issue">App Issue</option>
      </select>
    </div>

    <div class="pm-section" id="srUserSection">
      <label>Who are you reporting?</label>
      <input id="srUser" placeholder="Username">
    </div>

    <div class="pm-section">
      <label>Where did this happen?</label>
      <input id="srWhere" placeholder="Public chat, DM, room, etc.">
    </div>

    <div class="pm-section">
      <label>When did this happen?</label>
      <input id="srWhen" type="datetime-local">
    </div>

    <div class="pm-section">
      <label>Additional Information</label>
      <textarea id="srInfo" rows="5"></textarea>
    </div>

    <button id="srSubmit">Submit Report</button>
  </div>
</div>

<!-- HIDDEN ADMIN STRUCTURE (PREVENT JS ERRORS) -->
<div id="modalAdminPassword" class="hidden-admin">
  <button id="adminPasswordCancel"></button>
  <button id="adminPasswordSubmit"></button>
  <input id="adminPasswordInput">
  <div id="adminPasswordError"></div>
</div>

<div id="modalAdmin" class="hidden-admin">
  <button id="adminClose"></button>

  <div id="adminUsersView"></div>
  <div id="adminAnalyticsView"></div>

  <div id="adminStatsSummary"></div>

  <table id="adminTopIps">
    <tbody></tbody>
  </table>

  <table id="adminTable">
    <tbody></tbody>
  </table>
</div>

<!-- Hidden edit cancel button -->
<button id="editCancel" class="hidden-admin"></button>



<script src="/socket.io/socket.io.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/register.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/pm.js"></script>
<script src="/js/admin.js"></script>
  <script src="/js/admin-auth.js"></script>
<script src="/js/analytics.js"></script>
  <script src="/js/dm-toggle.js"></script>
  <script src="/js/profile.js"></script>
<script src="/js/landing.js"></script>
<script>


<script>

// LOGIN
document.getElementById("btnLogin").onclick = () => {
  const user = document.getElementById("loginUser").value;
  const pass = document.getElementById("loginPass").value;

  if (!user || !pass) return alert("Enter username and password");

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
};

// REGISTER (placeholder)
document.getElementById("btnRegister").onclick = () => {
  alert("Registration coming soon");
};

// SIDEBAR
document.querySelectorAll(".sidebar-item").forEach(item => {
  item.addEventListener("click", () => {

    document.querySelectorAll(".sidebar-item")
      .forEach(i => i.classList.remove("active"));
    item.classList.add("active");

    const section = item.dataset.section;

    if (section === "logout") {
      location.reload();
      return;
    }

    if (section === "profile") {
      openPopup("supportPopup");
      return;
    }

    document.getElementById("mainContent").innerHTML =
      `<h2>${section}</h2><p>Loaded ${section} section.</p>`;
  });
});

// SUPPORT FORM LOGIC
document.getElementById("srType").addEventListener("change", () => {
  const type = document.getElementById("srType").value;
  document.getElementById("srUserSection").style.display =
    type === "user" ? "block" : "none";
});
</script>

</body>
</html>
